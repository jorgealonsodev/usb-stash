name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system deps
        run: |
          sudo apt update
          sudo apt install -y libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev libgtk-3-dev

      - name: Build CLI
        run: cargo build --release -p usbstash-cli

      - name: Build Tauri
        run: cargo build --release -p usb-stash

      - name: Package
        run: |
          mkdir -p dist
          cp target/release/usbstash dist/usbstash-linux
          cp target/release/usb-stash dist/usb-stash-linux
          cd dist && sha256sum * > SHA256SUMS-linux.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-binaries
          path: dist/

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build CLI
        run: cargo build --release -p usbstash-cli

      - name: Build Tauri
        run: cargo build --release -p usb-stash

      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          cp target/release/usbstash.exe dist/usbstash-win.exe
          cp target/release/usb-stash.exe dist/usb-stash-win.exe
          cd dist && sha256sum *.exe > SHA256SUMS-windows.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-binaries
          path: dist/

  publish:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: linux-binaries
          path: dist/linux
      - uses: actions/download-artifact@v4
        with:
          name: windows-binaries
          path: dist/windows

      - name: Merge artifacts
        run: |
          mkdir -p release
          cp dist/linux/* release/
          cp dist/windows/* release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
