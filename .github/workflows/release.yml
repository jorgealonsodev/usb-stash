name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system deps
        run: |
          sudo apt update
          sudo apt install -y libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev libgtk-3-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Build CLI
        run: cargo build --release -p usbstash-cli

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: Build Tauri GUI
        run: |
          sed -i 's/"beforeBuildCommand": "npm run build"/"beforeBuildCommand": ":"/' src-tauri/tauri.conf.json
          sed -i 's/"active": true/"active": false/' src-tauri/tauri.conf.json
          cargo tauri build

      - name: Package
        run: |
          mkdir -p dist
          cp target/release/usbstash dist/usb-stash-linux
          # cargo tauri build may place binary in src-tauri/target/ or workspace target/
          GUI_BIN="target/release/usb-stash"
          if [ ! -f "$GUI_BIN" ]; then
            GUI_BIN="src-tauri/target/release/usb-stash"
          fi
          cp "$GUI_BIN" dist/usb-stash-gui-linux
          cp run.sh dist/run.sh
          cd dist && sha256sum usb-stash-linux usb-stash-gui-linux > SHA256SUMS-linux.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-binaries
          path: dist/

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Build CLI
        run: cargo build --release -p usbstash-cli

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: Build Tauri GUI
        shell: bash
        run: |
          sed -i 's/"beforeBuildCommand": "npm run build"/"beforeBuildCommand": ":"/' src-tauri/tauri.conf.json
          sed -i 's/"active": true/"active": false/' src-tauri/tauri.conf.json
          cargo tauri build

      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          cp target/release/usbstash.exe dist/usb-stash-win.exe
          GUI_BIN="target/release/usb-stash.exe"
          if [ ! -f "$GUI_BIN" ]; then
            GUI_BIN="src-tauri/target/release/usb-stash.exe"
          fi
          cp "$GUI_BIN" dist/usb-stash-gui-win.exe
          cd dist && sha256sum usb-stash-win.exe usb-stash-gui-win.exe > SHA256SUMS-windows.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-binaries
          path: dist/

  publish:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: linux-binaries
          path: dist/linux
      - uses: actions/download-artifact@v4
        with:
          name: windows-binaries
          path: dist/windows

      - name: Merge artifacts
        run: |
          mkdir -p release
          cp dist/linux/usb-stash-linux release/
          cp dist/linux/usb-stash-gui-linux release/
          cp dist/linux/run.sh release/
          cp dist/windows/usb-stash-win.exe release/
          cp dist/windows/usb-stash-gui-win.exe release/
          cd release
          sha256sum usb-stash-linux usb-stash-gui-linux usb-stash-win.exe usb-stash-gui-win.exe > SHA256SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
