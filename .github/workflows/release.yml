name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system deps
        run: |
          sudo apt update
          sudo apt install -y libgtk-3-dev

      - name: Build CLI
        run: cargo build --release -p usbstash-cli

      - name: Build GUI
        run: cargo build --release -p usbstash-gui

      - name: Package
        run: |
          mkdir -p dist
          cp target/release/usbstash dist/usb-stash-linux
          cp target/release/usbstash-gui dist/usb-stash-gui-linux
          cp run.sh dist/run.sh
          cd dist && sha256sum usb-stash-linux usb-stash-gui-linux > SHA256SUMS-linux.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-binaries
          path: dist/

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build CLI
        run: cargo build --release -p usbstash-cli

      - name: Build GUI
        run: cargo build --release -p usbstash-gui

      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          cp target/release/usbstash.exe dist/usb-stash-win.exe
          cp target/release/usbstash-gui.exe dist/usb-stash-gui-win.exe
          cd dist && sha256sum usb-stash-win.exe usb-stash-gui-win.exe > SHA256SUMS-windows.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-binaries
          path: dist/

  publish:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: linux-binaries
          path: dist/linux
      - uses: actions/download-artifact@v4
        with:
          name: windows-binaries
          path: dist/windows

      - name: Merge artifacts
        run: |
          mkdir -p release
          cp dist/linux/usb-stash-linux release/
          cp dist/linux/usb-stash-gui-linux release/
          cp dist/linux/run.sh release/
          cp dist/windows/usb-stash-win.exe release/
          cp dist/windows/usb-stash-gui-win.exe release/
          cd release
          sha256sum usb-stash-linux usb-stash-gui-linux usb-stash-win.exe usb-stash-gui-win.exe > SHA256SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
